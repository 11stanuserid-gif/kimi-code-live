<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimi Code - Live</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem}
        .c{text-align:center;max-width:600px;width:100%}
        h1{font-size:2.4rem;margin-bottom:.5rem;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{color:#888;margin-bottom:2rem}
        .box{background:#1a1a2e;border-radius:16px;padding:2rem;margin-bottom:1.5rem;border:1px solid #333}
        .btn{padding:16px 40px;border:none;border-radius:10px;font-size:1.1rem;cursor:pointer;font-weight:bold;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;text-decoration:none;display:inline-block;transition:all .3s}
        .btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(102,126,234,.5)}
        .spin{border:3px solid #333;border-top:3px solid #667eea;border-radius:50%;width:36px;height:36px;animation:sp 1s linear infinite;margin:1.5rem auto}
        @keyframes sp{to{transform:rotate(360deg)}}
        .url{background:#0d1117;padding:1rem;border-radius:10px;word-break:break-all;font-family:monospace;color:#58a6ff;margin:1rem 0;border:1px solid #333}
        .url a{color:#58a6ff;text-decoration:none}
        .ok{color:#00ff88;font-size:1.2rem}
        .wait{color:#ffaa00;font-size:1rem}
    </style>
</head>
<body>
<div class="c">
    <h1>🧠 Kimi Code</h1>
    <p class="sub">AI Coding Assistant</p>
    <div class="box">
        <div id="status"><div class="spin"></div><p class="wait">Checking Kimi Code...</p></div>
        <div id="link" style="display:none"></div>
    </div>
    <p style="color:#555;font-size:.8rem">Auto-refreshes every 15 seconds</p>
</div>
<script>
const URL_FILE = 'https://raw.githubusercontent.com/11stanuserid-gif/kimi-code-live/main/docs/tunnel-url.txt';
const UPD_FILE = 'https://raw.githubusercontent.com/11stanuserid-gif/kimi-code-live/main/docs/tunnel-updated.txt';
async function check() {
    try {
        const u = await fetch(UPD_FILE + '?t=' + Date.now());
        if (u.ok) {
            const age = (Date.now() - new Date((await u.text()).trim()).getTime()) / 60000;
            if (age > 8) { document.getElementById('status').innerHTML = '<p class="wait">⏳ Kimi starting...</p>'; return; }
        }
        const r = await fetch(URL_FILE + '?t=' + Date.now());
        if (r.ok) {
            const url = (await r.text()).trim();
            if (url.includes('trycloudflare')) {
                document.getElementById('status').innerHTML = '<p class="ok">✅ LIVE!</p>';
                document.getElementById('link').style.display = 'block';
                document.getElementById('link').innerHTML = '<div class="url"><a href="'+url+'" target="_blank">'+url+'</a></div><a href="'+url+'" target="_blank" class="btn">🚀 Open Kimi Code</a>';
                return;
            }
        }
    } catch(e) {}
    document.getElementById('status').innerHTML = '<div class="spin"></div><p class="wait">Starting Kimi Code...</p>';
}
check(); setInterval(check, 15000);
</script>
</body>
</html>
